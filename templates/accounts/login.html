{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Sign In — EduTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">

        <h2 class="card-title mb-1 fw-bold">Sign in</h2>
        <p class="text-muted mb-4">Welcome back to EduTrack.</p>

        <form method="post" novalidate aria-label="Login form">
          {% csrf_token %}
          {{ form|crispy }}

          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
            </button>
          </div>
        </form>

      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Don't have an account?
      <a href="{% url 'accounts:register' %}">Create one</a>
    </p>

  </div>
</div>
{% endblock %}
