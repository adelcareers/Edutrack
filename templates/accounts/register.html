{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register — EduTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">

        <h2 class="card-title mb-1 fw-bold">Create your account</h2>
        <p class="text-muted mb-4">Start tracking your child's home education journey.</p>

        <form method="post" novalidate aria-label="Parent registration form">
          {% csrf_token %}
          {{ form|crispy }}

          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-person-plus me-1"></i>Create account
            </button>
          </div>
        </form>

      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Already have an account?
      <a href="/accounts/login/">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
