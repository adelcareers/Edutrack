name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, 'ci/**', 'feat/**', 'fix/**', 'chore/**' ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-secret-key-for-testing-only-please-change-in-production-1234567890
      DJANGO_DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      # Use SQLite for CI — no database secret required.
      # Heroku uses its own DATABASE_URL config var at runtime.
      DATABASE_URL: "sqlite:////tmp/ci-test-db.sqlite3"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Java (for html5 validator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run Django checks
        run: |
          python manage.py check

      - name: Run Django deploy checks
        env:
          DJANGO_DEBUG: "False"
          SECURE_SSL_REDIRECT: "True"
          SESSION_COOKIE_SECURE: "True"
          CSRF_COOKIE_SECURE: "True"
          SECURE_HSTS_SECONDS: "31536000"
          SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
          SECURE_HSTS_PRELOAD: "True"
        run: |
          python manage.py check --deploy --fail-level WARNING

      - name: Run tests
        run: |
          python manage.py test --verbosity=2

      - name: Code style checks
        run: |
          black --check .
          isort --check-only .
          flake8

      - name: HTML validation (templates)
        run: |
          html5validator --root templates/

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
